# Keep TPM plugins under XDG config instead of ~/.tmux
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.3.0'

set -g @catppuccin_flavor 'latte'

# Common QoL bindings
set -g mouse on
set -s escape-time 0
set -g history-limit 50000
set -g base-index 1
set -g renumber-windows on
set-window-option -g mode-keys vi

# Splits open in the current pane's path instead of $HOME
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# vi-style pane navigation, repeatable
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# vi-style repeatable pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r Space last-window
bind y set-window-option synchronize-panes

# Reload config in place
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ThePrimeagen's tmux-sessionizer: https://github.com/ThePrimeagen/tmux-sessionizer
bind -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

run '~/.config/tmux/plugins/tpm/tpm'
