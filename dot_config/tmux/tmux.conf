# Keep TPM plugins under XDG config instead of ~/.tmux
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'

# Custom warm-light theme, generated from 'mini.hues' in the Neovim config.
# Palette source of truth: ~/.config/palette.json (chezmoi-managed).
set -ga terminal-overrides ",*256col*:Tc"

set -g status-style "bg=#ece4d8,fg=#2e2a22"
set -g status-left "#[fg=#ece4d8,bg=#290774,bold] #S #[default] "
set -g status-left-length 20
set -g status-right "#[fg=#69645b]%Y-%m-%d %H:%M "

set -g window-status-current-style "bold,bg=#290774,fg=#ece4d8"
set -g window-status-current-format " #I:#W "
set -g window-status-style "fg=#69645b"
set -g window-status-format " #I:#W "

set -g pane-border-style "fg=#cac3b7"
set -g pane-active-border-style "fg=#005b86"

set -g message-style "bg=#6f6600,fg=#ece4d8"
set -g message-command-style "bg=#6f6600,fg=#ece4d8"

set -g mode-style "bg=#f7ea5c,fg=#2e2a22"
set -g clock-mode-colour "#005b86"

# Common QoL bindings
set -g mouse on
set -s escape-time 0
set -g history-limit 50000
set -g base-index 1
set -g renumber-windows on
set-window-option -g mode-keys vi

# Splits open in the current pane's path instead of $HOME
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# vi-style pane navigation, repeatable
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# vi-style repeatable pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r Space last-window
bind y set-window-option synchronize-panes

# Reload config in place
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ThePrimeagen's tmux-sessionizer: https://github.com/ThePrimeagen/tmux-sessionizer
bind -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

run '~/.config/tmux/plugins/tpm/tpm'
